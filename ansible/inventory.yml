---
all:
  hosts:
    raspberrypi:
      ansible_host: "{{ lookup('env', 'PI_HOST') | default('raspberrypi', true) }}"
      ansible_user: "{{ lookup('env', 'PI_USER') | default('brad', true) }}"
      ansible_port: 22
      tailscale_oauth_client_id: "{{ lookup('env', 'TS_OAUTH_CLIENT_ID') | default('', true) }}"
      tailscale_oauth_client_secret: "{{ lookup('env', 'TS_OAUTH_CLIENT_SECRET') | default('', true) }}"
