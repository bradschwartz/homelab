---
- name: Check if Tailscale is already installed
  ansible.builtin.command:
    cmd: which tailscale
  register: tailscale_check
  changed_when: false
  failed_when: false

- name: Install Tailscale
  ansible.builtin.shell:
    cmd: curl -fsSL https://tailscale.com/install.sh | sh
    executable: /bin/bash
  when: tailscale_check.rc != 0

- name: Check auth status
  ansible.builtin.command:
    cmd: tailscale status
  register: tailscale_status_before
  changed_when: false
  failed_when: false

- name: Authenticate with Tailscale
  ansible.builtin.command:
    cmd: >-
      tailscale up
      --authkey={{ tailscale_auth_key }}
      --hostname=raspberrypi
      --ssh
      --accept-routes
  when:
    - tailscale_auth_key | length > 0
    - tailscale_status_before.rc != 0

- name: Re-check auth status after auth
  ansible.builtin.command:
    cmd: tailscale status
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Wait for Tailscale interface
  ansible.builtin.wait_for:
    path: /sys/class/net/tailscale0
    timeout: 30
  when: tailscale_status.rc == 0

- name: Get Tailscale IP
  ansible.builtin.command:
    cmd: tailscale ip -4
  register: tailscale_ip_raw
  changed_when: false
  when: tailscale_status.rc == 0

- name: Set tailscale_ip fact
  ansible.builtin.set_fact:
    tailscale_ip: "{{ tailscale_ip_raw.stdout }}"
  when:
    - tailscale_status.rc == 0
    - tailscale_ip_raw.stdout | length > 0
